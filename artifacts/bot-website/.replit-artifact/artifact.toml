kind = "web"
previewPath = "/"
title = "BasurAi Website"
version = "1.0.0"
id = "artifacts/bot-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18960

[services.development]
run = "pnpm --filter @workspace/bot-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bot-website", "run", "build" ]
publicDir = "artifacts/bot-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18960"
BASE_PATH = "/"
